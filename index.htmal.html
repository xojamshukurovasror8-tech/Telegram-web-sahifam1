 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Telegram Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50 px;
      background-color: #f5f5f5;
    }
    button {
      padding: 15 px 30 px;
      font-size: 18 px;
      background-color: #0088cc;
      color: white;
      border: none;
      border-radius: 8 px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0077b3;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Telegram Web App!</h1>
  <p>This is a minimal Web App page integrated with your bot.</p>
  <button id="btn">Send Data to Bot</button>

  <script>
    // Telegram Web App API
    const tg = window.Telegram.WebApp;

    // Foydalanuvchi tugmani bosganda
    document.getElementById('btn').addEventListener('click', () => {
      tg.sendData("Hello from Web App!");
      alert("Data sent to bot!");
    });

    // Sahifa yuklanganda Telegram bilan aloqa urnatiladi
    tg.expand(); // Sahifa balandligini kengaytiradi
  </script>
</body>
</html>
